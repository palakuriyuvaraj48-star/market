services:
  mysql:
    image: mysql:8.4
    container_name: freshmart-pro-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-freshmart_pro}
      MYSQL_USER: ${MYSQL_USER:-freshmart}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-freshmart}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - freshmart_mysql:/var/lib/mysql
      - ../../database/schema:/docker-entrypoint-initdb.d/schema
      - ../../database/seed:/docker-entrypoint-initdb.d/seed
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/Dockerfile.backend
    container_name: freshmart-pro-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-freshmart_pro}
      DB_USERNAME: ${MYSQL_USER:-freshmart}
      DB_PASSWORD: ${MYSQL_PASSWORD:-freshmart}
      JWT_SECRET: ${JWT_SECRET:-replace-with-at-least-32-characters-secret}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.frontend
    container_name: freshmart-pro-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  freshmart_mysql:
